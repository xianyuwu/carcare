# ─── CarCare 本地开发 / 生产部署 ───
# 仅启动 PG：docker compose up -d postgres
# 全部启动：docker compose up -d

services:
  app:
    build: .
    container_name: carcare-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - STORAGE_DIR=/app/data/files
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: carcare-pg
    restart: unless-stopped
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: carcare
      POSTGRES_PASSWORD: carcare2024
      POSTGRES_DB: carcare
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U carcare"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
