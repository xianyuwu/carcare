# ─── CarCare 生产部署 ───
# 启动：docker compose up -d
# 查看日志：docker compose logs -f
# 停止：docker compose down

services:
  app:
    build: .
    container_name: carcare-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据（SQLite DB + 上传文件 + 向量库）
      - ./data:/app/data
    env_file:
      - .env
    environment:
      # 无 DATABASE_URL 默认 SQLite（/app/data/carcare.db）
      - STORAGE_DIR=/app/data/files

  # === 可选：Caddy 反向代理（自动 HTTPS） ===
